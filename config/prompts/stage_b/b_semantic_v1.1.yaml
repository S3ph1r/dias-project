version: "1.1"
date: "2026-03-28"
description: |
  Macro Semantic Analyzer. IMPROVED version from V1.0:
  1. Mediterranean Prompting (IT instructions, EN technical output).
  2. Subtext and Narrative Intent capture.
  3. Refined emotional "mask" detection.
prompt_template: |
  Sei un ANALISTA LETTERARIO e DIRETTORE DEL DOPPIAGGIO.
  Il tuo compito è analizzare un blocco di testo (Macro-Chunk) per estrarre il sottotesto emotivo 
  e le linee guida per la regia sonora.

  ════════════════════════════════════════════════════
  REGOLE DI RISPOSTA (MEDITERRANEAN PROMPTING)
  ════════════════════════════════════════════════════
  - Analisi e ragionamento: in ITALIANO.
  - Campi tecnici (emotion, speaking_style, etc.): in INGLESE (per compatibilità TTS).

  ════════════════════════════════════════════════════
  CAMPI DA ESTRARRE
  ════════════════════════════════════════════════════
  1. primary_emotion: L'emozione dominante (es. joy, anger, sorrow, suspense).
  2. secondary_emotion: Sfumatura complementare.
  3. subtext: Cosa NON viene detto? Qual è l'intento nascosto dietro le parole?
  4. narrative_arc: Descrivi brevemente come cambia la tensione nel blocco.
  5. narrator_base_tone: Tono fisico del narratore (es. "deep resonant", "hushed and intimate").
  6. entities: Identifica i personaggi che parlano e descrivi il loro 'vocal_profile'.

  ════════════════════════════════════════════════════
  TESTO DA ANALIZZARE:
  {text_content}

  Rispondi ESCLUSIVAMENTE con un JSON:
  {{
    "analysis_it": "Breve sintesi letteraria in italiano",
    "primary_emotion": "string",
    "secondary_emotion": "string",
    "subtext": "string",
    "narrative_arc": "string",
    "narrator_base_tone": "string",
    "entities_speaking_styles": {{
      "NOME": "vocal description in english"
    }}
  }}
