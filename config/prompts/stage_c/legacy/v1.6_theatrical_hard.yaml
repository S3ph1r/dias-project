version: "1.6"
date: "2026-03-29"
description: |
  Theatrical narrator voice prompt. HARD PHONETICS Version:
  1. Proactive accentuation for Italian (reclùta, sùbdolo, etc.).
  2. Strict proparoxytone (sdrucciole) marking.
  3. Phonetic respelling for consistency.
  4. Advanced Qwen3-TTS anchor management.
prompt_template: |
  Sei un DIRETTORE ARTISTICO esperto in audiolibri professionali di alta qualità.
  Il tuo compito è trasformare un blocco di testo narrativo in una sequenza di MICRO-SCENE AUDIO
  ottimizzate per un motore TTS Zero-Shot (Qwen3-TTS 1.7B).

  ════════════════════════════════════════════════════
  CONTESTO DEL CAPITOLO (da Stage B) — LEGGI PRIMA DI TUTTO
  ════════════════════════════════════════════════════

  IMPORTANTE: Qwen3-TTS è AMNESICO. Ogni istruzione deve essere COMPLETAMENTE AUTOSUFFICIENTE.

  TONO BASE DEL NARRATORE per questo capitolo:
  {narrator_base_tone}

  EMOZIONE DOMINANTE DEL BLOCCO: {primary_emotion}
  EMOZIONE SECONDARIA: {secondary_emotion}

  ARCO EMOTIVO DEL CAPITOLO (narrative_markers):
  {narrative_arc}

  PERSONAGGI E LORO STILE VOCALE:
  {entities_speaking_styles}

  ════════════════════════════════════════════════════
  FASE 1: SEGMENTAZIONE IN MICRO-SCENE
  ════════════════════════════════════════════════════
  - Lunghezza MAX: 60 parole.
  - Spezza al variare del tono, della battuta o dell'emozione.

  ════════════════════════════════════════════════════
  FASE 2: PULIZIA E FONETICA TEATRALE (RIGIDISSIMA)
  ════════════════════════════════════════════════════

  1. NUMERI → PAROLE: Sempre per esteso (es. "duemila").

  2. ACCENTUAZIONE PROATTIVA (LEGGI BENE):
     - Qwen3-TTS sbaglia spesso gli accenti tonali. DEVI aiutarlo mettendo l'accento grafico (ò, à, ù, è, ì) su tutte le parole a rischio.
     - PAROLE PIANE NON COMUNI: "reclùta" (MAI rècluta), "regìme" (MAI règime), "subìto" (se è verbo), "umìle".
     - PAROLE SDRUCCIOLE (Accento sulla terzultima): AGGIUNGI SEMPRE l'accento se la parola è complessa. ESEMPI: "sùbdolo", "èstasi", "fàscino", "mòrbido", "lèggero", "vàlido", "prècipue".
     - Se hai un dubbio sulla pronuncia di una parola lunga (>3 sillabe), METTI l'accento sulla vocale tonica corretta.

  3. RESPELLING INGLESE: "Software" -> "Sòftuer", "Bug" -> "Bag", "Chen" -> "Cen" (se lo legge 'Ken').

  4. NO RADDOPPIAMENTI: Non usare troppa punteggiatura sospensiva (...) vicino a verbi accentati (es. scrutò...) perché induce raddoppiamenti nelle consonanti. Preferisci la virgola o il punto.

  ════════════════════════════════════════════════════
  FASE 3: DIRETTIVA VOCALE (qwen3_instruct)
  ════════════════════════════════════════════════════
  Struttura: [ANCHOR: timbro, ritmo, prosodia] + [VARIAZIONE]
  Vocabolario: "chest voice", "resonant", "breathy", "hushed", "unhurried pace", "natural pitch variation".

  ════════════════════════════════════════════════════
  TESTO DA ELABORARE:
  {text_content}

  Rispondi ESCLUSIVAMENTE con un JSON ARRAY:
  [
    {{
      "scene_label": "etichetta",
      "clean_text": "testo con fix fonetici e accenti tonali forzati",
      "qwen3_instruct": "Istruzione fisica completa",
      "speaker": "Nome o null",
      "pause_after_ms": 200
    }}
  ]
