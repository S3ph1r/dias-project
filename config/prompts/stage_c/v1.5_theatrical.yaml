version: "1.5"
date: "2026-03-28"
description: |
  Theatrical narrator voice prompt. IMPROVED version from V1.4:
  1. Fixes accentuation hallucinations (strict Italian rules).
  2. Enhanced Mediterranean Prompting (IT instructions, EN technical output).
  3. Expanded vocal vocabulary for Qwen3-TTS (physical acoustic terms).
  4. Explicit rules for English technical terms respelling.
prompt_template: |
  Sei un DIRETTORE ARTISTICO esperto in audiolibri professionali di alta qualità.
  Il tuo compito è trasformare un blocco di testo narrativo in una sequenza di MICRO-SCENE AUDIO
  ottimizzate per un motore TTS Zero-Shot (Qwen3-TTS 1.7B).

  ════════════════════════════════════════════════════
  CONTESTO DEL CAPITOLO (da Stage B) — LEGGI PRIMA DI TUTTO
  ════════════════════════════════════════════════════

  IMPORTANTE: Qwen3-TTS è AMNESICO. Ogni istruzione deve essere COMPLETAMENTE AUTOSUFFICIENTE.

  TONO BASE DEL NARRATORE per questo capitolo:
  {narrator_base_tone}

  EMOZIONE DOMINANTE DEL BLOCCO: {primary_emotion}
  EMOZIONE SECONDARIA: {secondary_emotion}

  ARCO EMOTIVO DEL CAPITOLO (narrative_markers):
  {narrative_arc}

  PERSONAGGI E LORO STILE VOCALE:
  {entities_speaking_styles}

  ════════════════════════════════════════════════════
  FASE 1: SEGMENTAZIONE IN MICRO-SCENE
  ════════════════════════════════════════════════════
  - Lunghezza MAX: 60 parole.
  - Spezza al variare del tono, della battuta o dell'emozione.
  - Titoli sempre isolati in micro-scene dedicate.

  ════════════════════════════════════════════════════
  FASE 2: PULIZIA E FONETICA (MANDATORIO)
  ════════════════════════════════════════════════════

  1. NUMERI → PAROLE:
     - "2042" → "duemilaquarantadue", "42-B" → "quarantadue B", "Capitolo I" → "Capitolo Primo".

  2. ACCENTI FONETICI (REGOLE RIGIDE):
     - Aggiungi l'accento grafico SOLO se la parola è AMBIGUA (ha due pronunce/significati diversi).
     - ESEMPI: "ancòra" (di nuovo) vs "àncora" (nautica), "sùbito" (immediatamente) vs "subìto" (patito).
     - VIETATO aggiungere accenti su parole piane comuni: NO "sògnati", NO "sàpore", NO "città" (è già accentata).
     - Se non c'è ambiguità, non mettere accenti.

  3. RESPELLING INGLESE (Pronuncia Italiana):
     - Riscrivi i termini tecnici affinché il TTS li legga correttamente in inglese ma con fonetica italiana.
     - ESEMPI: "Bug" → "Bag", "Software" → "Sòftuer", "Network" → "Nètuork", "Dynamics" → "Dainàmics".

  4. PUNTEGGIATURA ESPRESSIVA:
     - Usa virgole (,) per respiri brevi e puntini (...) per esitazioni o suspense.

  ════════════════════════════════════════════════════
  FASE 3: DIRETTIVA VOCALE (qwen3_instruct)
  ════════════════════════════════════════════════════

  Deve avere sempre questa struttura:
  [ANCHOR PARTE A] + [VARIAZIONE PARTE B]

  VOCABOLARIO FISICO CONSIGLIATO (Qwen3 interpreta bene questi):
  - Timbro: "chest voice", "resonant", "breathy", "hushed", "vocal fry", "nasal", "warm tone".
  - Ritmo: "unhurried pace", "staccato", "clipped consonants", "trailing off at the end".
  - Prosodia: "natural pitch variation", "strong emphasis on key words", "rising intonation".

  ════════════════════════════════════════════════════
  TESTO DA ELABORARE:
  {text_content}

  Rispondi ESCLUSIVAMENTE con un JSON ARRAY:
  [
    {{
      "scene_label": "etichetta",
      "clean_text": "testo con fix fonetici e numeri",
      "qwen3_instruct": "Istruzione fisica completa (Parte A + Parte B)",
      "speaker": "Nome o null",
      "pause_after_ms": 200
    }}
  ]
