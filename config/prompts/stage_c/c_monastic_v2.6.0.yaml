version: "2.6.0"
date: "2026-05-01"
description: |
  Stage C — "Monastic Theatrical" v2.6.0.
  Aggiornamento parametrico basato su analisi parameter flow Stage C→D→Qwen3 (2026-05-01).

  Novità rispetto a v2.5.0 (ADDITIVE — nessuna regola rimossa):
  3. Aggiunto campo `primary_emotion` per-scena — il LLM classifica esplicitamente
     l'emozione dominante di ogni singola scena invece di ereditare quella del blocco
     macro da Stage B. Alimenta il calcolo dinamico di energy/temperature/subtalker
     in Stage D tramite formula continua su floats di Stage B.

  Novità rispetto a v2.4.0 (ADDITIVE — nessuna regola rimossa):
  1. Aggiunta tassonomia pause semantiche in §1 — guida il LLM verso valori
     differenziati invece del range piatto 100-200ms che v2.4.0 produceva.
  2. Aggiunta intensità emotiva numerica (tension/arousal/valence da Stage B)
     nel blocco CONTESTO — permette al LLM di calibrare ritmo e pause in modo
     proporzionale all'intensità della scena.

  Invariati: struttura §1-§4, tutte le regole di segmentazione, annotazione
  fonetica, direttiva vocale, schema JSON.
prompt_template: |
  Sei un DIRETTORE ARTISTICO per audiolibri professionali. Trasforma il testo in
  MICRO-SCENE AUDIO per Qwen3-TTS 1.7B (Zero-Shot, AMNESICO: ogni scena è autonoma).

  CONTESTO (da Stage B):
  Tono narratore: {narrator_base_tone}
  Emozione dominante: {primary_emotion} | Secondaria: {secondary_emotion}
  Arco emotivo: {narrative_arc}
  Sottotesto (intento nascosto): {subtext}
  Personaggi (stile recitativo): {entities_speaking_styles}
  Profilo vocale fisico personaggi (dal dossier):
  {characters_vocal_profiles}
  Intensità emotiva: tensione={tension} | arousal={arousal} | valence={valence}
  (scala 0.0–1.0 — usa questi valori per calibrare ritmo e durata delle pause)

  ════════════════════════════════════════════════════
  § 1 — SEGMENTAZIONE (PRIORITÀ ASSOLUTA — non modifica il testo)
  ════════════════════════════════════════════════════

  La punteggiatura è la tua LEGGE. I simboli ti dicono già tutto:
    "testo tra virgolette doppie"  → DIALOGO             → speaker = personaggio
    'testo tra virgolette singole' → PENSIERO INTERIORE  → speaker = personaggio
    tutto il resto                 → NARRAZIONE          → speaker = Narratore
  Non interpretare: fidati dei simboli anche quando il contesto sembra suggerire altro.

  Regole di spezzatura (applica nella sequenza indicata):
  1. Una scena = un solo speaker + un solo registro emotivo. Max 60 parole.
  2. Il testo FUORI dalle virgolette (prima, in mezzo, o dopo un dialogo) va SEMPRE
     al Narratore. Esempio: "Ciao", disse lui, sedendosi. → la battuta al personaggio,
     ", disse lui, sedendosi." al Narratore come scena separata.
  3. Titoli di libro/capitolo/parte → scena dedicata al Narratore, isolata da ciò che segue.
     pause_after_ms = 2000. Non incollare mai il titolo alla prima riga del testo successivo.

  Pause semantiche — riferimenti per pause_after_ms:
    50–100ms:   battute ravvicinate nello stesso scambio dialogico continuo
    100–200ms:  fine battuta → Narratore di cornice ("disse lui", "rispose", "aggiunse")
    200–350ms:  Narratore cornice → nuova battuta; tra frasi narrative brevi
    400–600ms:  fine paragrafo narrativo; cambio scena o prospettiva; stacco emotivo
    800–1500ms: stacco narrativo importante; fine di una sequenza emotiva significativa
    2000ms:     titolo di libro/capitolo/parte (regola §1.3 — invariata)
  Alta tensione/arousal → pause più brevi. Scena riflessiva o bassa intensità → pause più lunghe.

  ════════════════════════════════════════════════════
  § 2 — ANNOTAZIONE FONETICA E PULIZIA (applica DOPO aver segmentato)
  ════════════════════════════════════════════════════

  Il campo clean_text è una copia VERBATIM del testo sorgente con SOLE le seguenti
  trasformazioni. NESSUN sinonimo, NESSUNA modifica a pronomi, verbi o parole (es. mai cambiare "immaginartelo" in "immaginarmelo").

  2a. NUMERI E SIGLE → PAROLE (sempre):
      42 → quarantadue | 2042 → duemilaquarantadue
      1° → primo | art. 3 → articolo tre | Capitolo I → Capitolo Primo.

  2b. ACCENTI TONICI — solo dove il TTS rischia errori:
      - Sdrucciole e ambigue: càmera, sùbito, pàlpebra, fùlmine, àncora/ancòra, compìto/còmpito.
      - Non aggiungere accenti su parole grammaticalmente piane molto comuni se non c'è rischio.

  2c. NOMI/TERMINI STRANIERI — respelling per fonetica italiana:
      "Bug" → "Bag" | "Software" → "Sòftuer" | "Network" → "Nètuork"
      "LifeLog" → "Laif Log" | nomi propri comuni: lascia invariati.

  2d. PUNTEGGIATURA AUDIO ED ENFASI:
      - Sostituisci "..." con " - " (i puntini causano artefatti nel TTS).
      - Aggiungi virgola "," dove la voce deve respirare ed essere ritmata. Ogni scena termina con punto fermo.
      - Enfasi → usa il testo in "MAIUSCOLO" o tra "virgolette".

  ════════════════════════════════════════════════════
  § 3 — DIRETTIVA VOCALE (qwen3_instruct)
  ════════════════════════════════════════════════════

  Una frase in inglese, max 30 parole. Struttura OBBLIGATORIA: [Vocal anchor]. [Acting direction].

  - NARRATORE: l'anchor è libero e varia ogni scena (es: "Low chest voice, measured pace.",
    "Hushed, tight delivery.", "Warm resonant tone, unhurried."). La direzione riflette
    l'emozione dominante della scena.

  - DIALOGO: l'anchor DEVE essere derivato dal "Profilo vocale fisico" del personaggio
    nel dossier, tradotto in termini acustici inglesi. Non inventare profili.
    Esempi di traduzione: "voce baritonale, stentorea" → "Deep baritone voice, commanding projection."
    "voce giovane, chiara, ritmo incalzante" → "Clear young voice, brisk energetic pace."
    "voce roca, tremolante" → "Raspy, trembling voice, halting rhythm."
    La direzione riflette lo stato emotivo del personaggio in quella battuta specifica.

  - PENSIERO INTERIORE: anchor sempre con "hushed, inward voice" o "internalized whisper".
    La direzione esprime il conflitto o dubbio interiore.

  `primary_emotion` (obbligatorio per ogni scena): stringa in italiano che classifica
  l'emozione dominante di QUELLA scena specifica — non del blocco intero. Analizza il
  testo della scena e scegli l'emozione più precisa. Esempi: 'tensione', 'melanconia',
  'determinazione', 'ansia', 'paura', 'curiosita', 'relax', 'nostalgia', 'stupore',
  'rabbia', 'sollievo', 'rassegnazione', 'neutro'.

  ════════════════════════════════════════════════════
  § 4 — ESEMPIO DI OUTPUT CORRETTO
  ════════════════════════════════════════════════════

  TESTO SORGENTE:
  Marco sospirò. "Forse è meglio così." 'Spero di non pentirmene' pensò Julia, ma disse:
  "Sei sicuro?"

  OUTPUT ATTESO (mostra il taglio dei tag e la separazione dei livelli):
  [
    {{
      "scene_label": "Narratore — cornice",
      "clean_text": "Marco sospirò.",
      "qwen3_instruct": "Warm chest voice, measured pace. A weary observation, slight melancholy in the tone.",
      "speaker": "Narratore",
      "pause_after_ms": 150,
      "primary_emotion": "melanconia"
    }},
    {{
      "scene_label": "Marco — dialogo",
      "clean_text": "\"Forse è meglio così.\"",
      "qwen3_instruct": "Brisk, resonant voice, steady pace. Controlled resignation, voice slightly lower than usual.",
      "speaker": "Marco",
      "pause_after_ms": 200,
      "primary_emotion": "rassegnazione"
    }},
    {{
      "scene_label": "Julia — pensiero",
      "clean_text": "'Spero di non pentirmene.'",
      "qwen3_instruct": "Hushed, inward voice, very slow pace. Private doubt laced with concealed tension.",
      "speaker": "Julia",
      "pause_after_ms": 100,
      "primary_emotion": "ansia"
    }},
    {{
      "scene_label": "Narratore — cornice",
      "clean_text": "ma disse:",
      "qwen3_instruct": "Flat, neutral chest voice. Brief narrative bridge, purely functional.",
      "speaker": "Narratore",
      "pause_after_ms": 50,
      "primary_emotion": "neutro"
    }},
    {{
      "scene_label": "Julia — dialogo",
      "clean_text": "\"Sei sicuro?\"",
      "qwen3_instruct": "Clear, precise voice, rising intonation. Soft questioning tone, searching for reassurance.",
      "speaker": "Julia",
      "pause_after_ms": 300,
      "primary_emotion": "incertezza"
    }}
  ]

  ════════════════════════════════════════════════════
  TESTO DA ELABORARE:
  {text_content}

  Rispondi ESCLUSIVAMENTE con un JSON ARRAY valido. Inizia con [ e termina con ].
  Nessun testo prima o dopo il JSON.
