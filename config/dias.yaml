# DIAS Pipeline Configuration
# Basato su blueprint v3 sezione 7

# Google GenAI Configuration
google:
  model_flash_lite: "gemini-3.1-flash-lite-preview"
  # model_flash_lite: "gemini-flash-lite-latest"
  rate_limit_seconds: 60
  daily_request_limit: 100
  rate_limit_penalty_seconds: 900
  max_retries: 3
  temperature: 0.2
  response_mime_type: "application/json"

# Stage B and C prompt versions (A/B testing)
stage_b_prompt_path: "config/prompts/stage_b/b_semantic_v1.2.yaml"
stage_c_prompt_path: "config/prompts/stage_c/c_monastic_v2.4.0.yaml"

# Local Models (GPU Worker)
models:
  active_tts_backend: "qwen3-tts-1.7b"
  
  qwen3_tts:
    name: "Qwen3-TTS-12Hz-1.7B-Base"
    device: "cuda"
    max_memory_gb: 8
    batch_size: 1
    default_voice: "luca"
    default_instruct: "Professional Italian male narrator, warm and engaging."
    default_temperature: 0.7
    default_top_p: 0.9

  musicgen:
    name: "musicgen-small"
    device: "cuda"
    max_memory_gb: 4

# Redis
redis:
  host: "192.168.1.120" # Override via REDIS_HOST env var
  port: 6379
  db: 0
  decode_responses: true
  retry_attempts: 3
  retry_backoff_base: 1.0

# Queue names (Redis Lists — BRPOP)
queues:
  ingestion: "dias:q:1:ingest"
  semantic: "dias:q:2:semantic"
  regia: "dias:q:3:regia"
  voice: "dias:q:4:voice"

# Storage
storage:
  base_path: "/mnt/dias/storage"
  temp_path: "/mnt/dias/temp"
  voice_output: "{base_path}/audio/voice/{book_id}"
  music_output: "{base_path}/audio/music/{book_id}"
  final_output: "{base_path}/output/{book_id}"

# Processing
pipeline:
  max_chunk_words: 2500
  chunk_overlap_words: 100
  scene_max_words: 300
  default_voice_sample: "/voices/default_narrator.wav"

# Audio Standards
audio:
  sample_rate: 48000
  voice_channels: 1
  music_channels: 2
  final_bitrate: "320k"
  target_lufs: -16
  head_silence_seconds: 2
  tail_silence_seconds: 3

# Logging
logging:
  level: "INFO"
  format: "json"
  file: null  # null = solo stderr, oppure path per file rotante
